name: Release Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Build target"
        type: choice
        required: true
        default: all
        options:
          - all
          - android
          - ios
      build_name:
        description: "Override app version name (optional)"
        type: string
        required: false
      build_number:
        description: "Override build number (optional)"
        type: string
        required: false
      upload_ios:
        description: "Upload iOS IPA to App Store Connect"
        type: boolean
        required: true
        default: false

permissions:
  contents: read

jobs:
  android:
    name: Android Prod Bundle
    if: ${{ inputs.platform == 'all' || inputs.platform == 'android' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
        working-directory: fundex

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          cache: true

      - name: Validate Android Release Secrets
        env:
          DART_DEFINE_PROD_JSON: ${{ secrets.STELLAVIA_DART_DEFINE_PROD_JSON }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.STELLAVIA_ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.STELLAVIA_ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.STELLAVIA_ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.STELLAVIA_ANDROID_KEY_PASSWORD }}
        run: |
          missing=()
          for var in \
            DART_DEFINE_PROD_JSON \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_STORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD
          do
            if [[ -z "${!var:-}" ]]; then
              missing+=("$var")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required Android release secrets:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Write Prod Dart Defines
        env:
          DART_DEFINE_PROD_JSON: ${{ secrets.STELLAVIA_DART_DEFINE_PROD_JSON }}
        run: |
          mkdir -p .vscode
          printf '%s' "$DART_DEFINE_PROD_JSON" > .vscode/dart_define.prod.local.json

      - name: Install Android Signing Files
        working-directory: fundex/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.STELLAVIA_ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.STELLAVIA_ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.STELLAVIA_ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.STELLAVIA_ANDROID_KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$PWD/upload-keystore.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"

          cat > key.properties <<EOF
          storeFile=$KEYSTORE_PATH
          storePassword=$ANDROID_STORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Android App Bundle
        env:
          BUILD_NAME: ${{ inputs.build_name }}
          BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          args=(
            build
            appbundle
            --flavor prod
            -t lib/main_prod.dart
            --dart-define-from-file=.vscode/dart_define.prod.local.json
          )

          if [[ -n "${BUILD_NAME:-}" ]]; then
            args+=(--build-name "$BUILD_NAME")
          fi
          if [[ -n "${BUILD_NUMBER:-}" ]]; then
            args+=(--build-number "$BUILD_NUMBER")
          fi

          flutter "${args[@]}"

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-prod-${{ github.run_number }}
          path: |
            fundex/build/app/outputs/bundle/prodRelease/
            fundex/build/app/outputs/mapping/prodRelease/
          if-no-files-found: error
          retention-days: 14

  ios:
    name: iOS Prod IPA
    if: ${{ inputs.platform == 'all' || inputs.platform == 'ios' }}
    runs-on: macos-latest
    timeout-minutes: 75
    defaults:
      run:
        shell: bash
        working-directory: fundex

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          cache: true

      - name: Validate iOS Release Secrets
        env:
          DART_DEFINE_PROD_JSON: ${{ secrets.STELLAVIA_DART_DEFINE_PROD_JSON }}
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.STELLAVIA_IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.STELLAVIA_IOS_DIST_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.STELLAVIA_IOS_PROVISIONING_PROFILE_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.STELLAVIA_APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.STELLAVIA_APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.STELLAVIA_APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
          UPLOAD_IOS: ${{ inputs.upload_ios }}
        run: |
          missing=()
          for var in \
            DART_DEFINE_PROD_JSON \
            IOS_DIST_CERT_P12_BASE64 \
            IOS_DIST_CERT_PASSWORD \
            IOS_PROVISIONING_PROFILE_BASE64
          do
            if [[ -z "${!var:-}" ]]; then
              missing+=("$var")
            fi
          done

          if [[ "${UPLOAD_IOS}" == "true" ]]; then
            for var in \
              APP_STORE_CONNECT_API_KEY_ID \
              APP_STORE_CONNECT_ISSUER_ID \
              APP_STORE_CONNECT_API_KEY_P8_BASE64
            do
              if [[ -z "${!var:-}" ]]; then
                missing+=("$var")
              fi
            done
          fi

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required iOS release secrets:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Write Prod Dart Defines
        env:
          DART_DEFINE_PROD_JSON: ${{ secrets.STELLAVIA_DART_DEFINE_PROD_JSON }}
        run: |
          mkdir -p .vscode
          printf '%s' "$DART_DEFINE_PROD_JSON" > .vscode/dart_define.prod.local.json

      - name: Import Code Signing Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.STELLAVIA_IOS_DIST_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.STELLAVIA_IOS_DIST_CERT_PASSWORD }}

      - name: Install Provisioning Profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.STELLAVIA_IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/fundex.mobileprovision"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | openssl base64 -d -A -out "$PROFILE_PATH"

          PROFILE_PLIST="$RUNNER_TEMP/fundex-profile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$PROFILE_PLIST")

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

      - name: Write App Store Connect API Key
        if: ${{ inputs.upload_ios }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.STELLAVIA_APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.STELLAVIA_APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8_BASE64" | openssl base64 -d -A -out "$API_KEY_PATH"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Install Dependencies
        run: flutter pub get

      - name: Install FlutterFire CLI
        run: |
          export PATH="$PUB_CACHE/bin:$PATH"
          dart pub global activate flutterfire_cli
          flutterfire --version

      - name: Build iOS IPA
        env:
          BUILD_NAME: ${{ inputs.build_name }}
          BUILD_NUMBER: ${{ inputs.build_number }}
          UPLOAD_IOS: ${{ inputs.upload_ios }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.STELLAVIA_APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.STELLAVIA_APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_PATH: ${{ env.APP_STORE_CONNECT_API_KEY_PATH }}
        run: |
          export PATH="$FLUTTER_ROOT/bin:$PATH"
          which flutter
          flutter --version

          if [[ "${UPLOAD_IOS}" == "true" ]]; then
            export SKIP_UPLOAD=0
          else
            export SKIP_UPLOAD=1
          fi

          bash scripts/build_ios_appstore.sh

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-prod-${{ github.run_number }}
          path: |
            fundex/build/ios/ipa/
            fundex/build/ios/archive/Runner.xcarchive
          if-no-files-found: error
          retention-days: 14
