name: Release Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Build target"
        type: choice
        required: true
        default: all
        options:
          - all
          - android
          - ios
      build_name:
        description: "Override app version name (optional)"
        type: string
        required: false
      build_number:
        description: "Override build number (optional)"
        type: string
        required: false
      upload_android:
        description: "Upload Android AAB to Google Play"
        type: boolean
        required: true
        default: false
      android_track:
        description: "Google Play track for Android upload"
        type: choice
        required: true
        default: internal
        options:
          - internal
          - production
      upload_ios:
        description: "Upload iOS IPA to App Store Connect"
        type: boolean
        required: true
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  android:
    name: Android Prod Bundle
    if: ${{ inputs.platform == 'all' || inputs.platform == 'android' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
        working-directory: fundex

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Android Release Metadata
        id: android_meta
        env:
          INPUT_BUILD_NAME: ${{ inputs.build_name }}
          INPUT_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          pubspec_version="$(awk '/^version:/{print $2; exit}' pubspec.yaml)"
          default_build_name="${pubspec_version%%+*}"
          default_build_number="${pubspec_version##*+}"
          if [[ "$default_build_number" == "$pubspec_version" ]]; then
            default_build_number="1"
          fi

          resolved_build_name="${INPUT_BUILD_NAME:-$default_build_name}"
          resolved_build_number="${INPUT_BUILD_NUMBER:-$default_build_number}"

          echo "build_name=$resolved_build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$resolved_build_number" >> "$GITHUB_OUTPUT"
          echo "artifact_name=StellaVia-android-prod-${resolved_build_name}(${resolved_build_number})" >> "$GITHUB_OUTPUT"
          echo "bundle_filename=StellaVia-prod-release-${resolved_build_name}(${resolved_build_number}).aab" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          cache: true

      - name: Validate Android Release Secrets
        env:
          DART_DEFINE_PROD_JSON: ${{ secrets.STELLAVIA_DART_DEFINE_PROD_JSON }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.STELLAVIA_ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.STELLAVIA_ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.STELLAVIA_ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.STELLAVIA_ANDROID_KEY_PASSWORD }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.STELLAVIA_GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          UPLOAD_ANDROID: ${{ inputs.upload_android }}
        run: |
          missing=()
          for var in \
            DART_DEFINE_PROD_JSON \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_STORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD
          do
            if [[ -z "${!var:-}" ]]; then
              missing+=("$var")
            fi
          done

          if [[ "${UPLOAD_ANDROID}" == "true" ]] && [[ -z "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}" ]]; then
            missing+=("GOOGLE_PLAY_SERVICE_ACCOUNT_JSON")
          fi

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required Android release secrets:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Write Prod Dart Defines
        env:
          DART_DEFINE_PROD_JSON: ${{ secrets.STELLAVIA_DART_DEFINE_PROD_JSON }}
        run: |
          mkdir -p .vscode
          printf '%s' "$DART_DEFINE_PROD_JSON" > .vscode/dart_define.prod.local.json

      - name: Validate Prod Dart Defines
        run: dart tool/validate_prod_dart_defines.dart .vscode/dart_define.prod.local.json

      - name: Install Android Signing Files
        working-directory: fundex/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.STELLAVIA_ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.STELLAVIA_ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.STELLAVIA_ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.STELLAVIA_ANDROID_KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$PWD/upload-keystore.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"

          cat > key.properties <<EOF
          storeFile=$KEYSTORE_PATH
          storePassword=$ANDROID_STORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Android App Bundle
        env:
          BUILD_NAME: ${{ steps.android_meta.outputs.build_name }}
          BUILD_NUMBER: ${{ steps.android_meta.outputs.build_number }}
        run: |
          args=(
            build
            appbundle
            --flavor prod
            -t lib/main_prod.dart
            --dart-define-from-file=.vscode/dart_define.prod.local.json
          )

          if [[ -n "${BUILD_NAME:-}" ]]; then
            args+=(--build-name "$BUILD_NAME")
          fi
          if [[ -n "${BUILD_NUMBER:-}" ]]; then
            args+=(--build-number "$BUILD_NUMBER")
          fi

          flutter "${args[@]}"

      - name: Rename Android Bundle
        id: android_package
        env:
          TARGET_BUNDLE_FILENAME: ${{ steps.android_meta.outputs.bundle_filename }}
        run: |
          source_bundle="$(find build/app/outputs/bundle/prodRelease -maxdepth 1 -name '*.aab' | head -n 1)"
          if [[ -z "${source_bundle:-}" ]]; then
            echo "Android App Bundle not found." >&2
            exit 1
          fi

          target_bundle="build/app/outputs/bundle/prodRelease/${TARGET_BUNDLE_FILENAME}"
          if [[ "$source_bundle" != "$target_bundle" ]]; then
            mv "$source_bundle" "$target_bundle"
          fi

          mapping_path="build/app/outputs/mapping/prodRelease/mapping.txt"
          if [[ -f "$mapping_path" ]]; then
            echo "has_mapping=true" >> "$GITHUB_OUTPUT"
            echo "mapping_path=$mapping_path" >> "$GITHUB_OUTPUT"
          else
            echo "has_mapping=false" >> "$GITHUB_OUTPUT"
          fi

          echo "bundle_path=$target_bundle" >> "$GITHUB_OUTPUT"
          echo "release_glob=build/app/outputs/bundle/prodRelease/*.aab" >> "$GITHUB_OUTPUT"

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.android_meta.outputs.artifact_name }}
          path: |
            fundex/${{ steps.android_package.outputs.bundle_path }}
            fundex/build/app/outputs/mapping/prodRelease/
          if-no-files-found: error
          retention-days: 14

      - name: Upload Android Bundle to Google Play
        if: ${{ inputs.upload_android && steps.android_package.outputs.has_mapping == 'true' }}
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.STELLAVIA_GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.fund.stellavia
          releaseFiles: fundex/${{ steps.android_package.outputs.release_glob }}
          track: ${{ inputs.android_track }}
          status: completed
          mappingFile: fundex/${{ steps.android_package.outputs.mapping_path }}

      - name: Upload Android Bundle to Google Play
        if: ${{ inputs.upload_android && steps.android_package.outputs.has_mapping != 'true' }}
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.STELLAVIA_GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.fund.stellavia
          releaseFiles: fundex/${{ steps.android_package.outputs.release_glob }}
          track: ${{ inputs.android_track }}
          status: completed

  ios:
    name: iOS Prod IPA
    if: ${{ inputs.platform == 'all' || inputs.platform == 'ios' }}
    runs-on: macos-latest
    timeout-minutes: 75
    defaults:
      run:
        shell: bash
        working-directory: fundex

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve iOS Release Metadata
        id: ios_meta
        env:
          INPUT_BUILD_NAME: ${{ inputs.build_name }}
          INPUT_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          pubspec_version="$(awk '/^version:/{print $2; exit}' pubspec.yaml)"
          default_build_name="${pubspec_version%%+*}"
          default_build_number="${pubspec_version##*+}"
          if [[ "$default_build_number" == "$pubspec_version" ]]; then
            default_build_number="1"
          fi

          resolved_build_name="${INPUT_BUILD_NAME:-$default_build_name}"
          resolved_build_number="${INPUT_BUILD_NUMBER:-$default_build_number}"

          echo "build_name=$resolved_build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$resolved_build_number" >> "$GITHUB_OUTPUT"
          echo "artifact_name=StellaVia-ios-prod-${resolved_build_name}(${resolved_build_number})" >> "$GITHUB_OUTPUT"
          echo "ipa_filename=StellaVia-${resolved_build_name}(${resolved_build_number}).ipa" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          cache: true

      - name: Validate iOS Release Secrets
        env:
          DART_DEFINE_PROD_JSON: ${{ secrets.STELLAVIA_DART_DEFINE_PROD_JSON }}
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.STELLAVIA_IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.STELLAVIA_IOS_DIST_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.STELLAVIA_IOS_PROVISIONING_PROFILE_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.STELLAVIA_APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.STELLAVIA_APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.STELLAVIA_APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
          UPLOAD_IOS: ${{ inputs.upload_ios }}
        run: |
          missing=()
          for var in \
            DART_DEFINE_PROD_JSON \
            IOS_DIST_CERT_P12_BASE64 \
            IOS_DIST_CERT_PASSWORD \
            IOS_PROVISIONING_PROFILE_BASE64
          do
            if [[ -z "${!var:-}" ]]; then
              missing+=("$var")
            fi
          done

          if [[ "${UPLOAD_IOS}" == "true" ]]; then
            for var in \
              APP_STORE_CONNECT_API_KEY_ID \
              APP_STORE_CONNECT_ISSUER_ID \
              APP_STORE_CONNECT_API_KEY_P8_BASE64
            do
              if [[ -z "${!var:-}" ]]; then
                missing+=("$var")
              fi
            done
          fi

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required iOS release secrets:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Write Prod Dart Defines
        env:
          DART_DEFINE_PROD_JSON: ${{ secrets.STELLAVIA_DART_DEFINE_PROD_JSON }}
        run: |
          mkdir -p .vscode
          printf '%s' "$DART_DEFINE_PROD_JSON" > .vscode/dart_define.prod.local.json

      - name: Validate Prod Dart Defines
        run: dart tool/validate_prod_dart_defines.dart .vscode/dart_define.prod.local.json

      - name: Import Code Signing Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.STELLAVIA_IOS_DIST_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.STELLAVIA_IOS_DIST_CERT_PASSWORD }}

      - name: Install Provisioning Profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.STELLAVIA_IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/fundex.mobileprovision"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | openssl base64 -d -A -out "$PROFILE_PATH"

          PROFILE_PLIST="$RUNNER_TEMP/fundex-profile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$PROFILE_PLIST")

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

      - name: Write App Store Connect API Key
        if: ${{ inputs.upload_ios }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.STELLAVIA_APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.STELLAVIA_APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8_BASE64" | openssl base64 -d -A -out "$API_KEY_PATH"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Install Dependencies
        run: flutter pub get

      - name: Install FlutterFire CLI
        run: |
          export PATH="$PUB_CACHE/bin:$PATH"
          dart pub global activate flutterfire_cli
          flutterfire --version

      - name: Build iOS IPA
        env:
          BUILD_NAME: ${{ steps.ios_meta.outputs.build_name }}
          BUILD_NUMBER: ${{ steps.ios_meta.outputs.build_number }}
          IPA_OUTPUT_NAME: ${{ steps.ios_meta.outputs.ipa_filename }}
          UPLOAD_IOS: ${{ inputs.upload_ios }}
          IOS_TEAM_ID: PGU4LJ2SPF
          IOS_BUNDLE_ID: com.fund.stellavia
          IOS_PROVISIONING_PROFILE_NAME: Stellavia_release_Profile
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.STELLAVIA_APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.STELLAVIA_APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_PATH: ${{ env.APP_STORE_CONNECT_API_KEY_PATH }}
        run: |
          export PATH="$FLUTTER_ROOT/bin:$PATH"
          which flutter
          flutter --version

          if [[ "${UPLOAD_IOS}" == "true" ]]; then
            export SKIP_UPLOAD=0
          else
            export SKIP_UPLOAD=1
          fi

          bash scripts/build_ios_appstore.sh

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ios_meta.outputs.artifact_name }}
          path: |
            fundex/build/ios/ipa/
            fundex/build/ios/archive/Runner.xcarchive
          if-no-files-found: error
          retention-days: 14
